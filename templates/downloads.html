<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下载管理 - Pixiv Viewer</title>
<link href="/static/vendor/bootstrap-5.3.3/bootstrap.min.css" rel="stylesheet">
<link href="/static/style.css" rel="stylesheet">
<style>
/* ── Status Cards ── */
.status-card {
  border: none;
  border-radius: var(--radius);
  background: var(--bg-elevated);
  border: 1px solid var(--border-card);
  margin-bottom: 1rem;
  overflow: hidden;
}
.status-card .card-header {
  font-weight: 600;
  font-size: 0.82rem;
  border-bottom: 1px solid var(--border-subtle);
}

.dl-item {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.6rem 0.75rem;
  border-bottom: 1px solid var(--border-subtle);
}
.dl-item:last-child { border-bottom: none; }
.dl-thumb {
  width: 48px;
  height: 48px;
  border-radius: 6px;
  object-fit: cover;
  background: var(--bg-thumb);
  flex-shrink: 0;
}
.dl-info { flex: 1; min-width: 0; }
.dl-title {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.dl-meta { font-size: 0.75rem; color: var(--text-muted); }

.progress { height: 4px; background: var(--border-subtle); }
.progress-bar { transition: width 0.3s ease; }
.log-entry { font-size: 0.72rem; padding: 4px 8px; color: var(--text-secondary); border-bottom: 1px solid var(--border-subtle); }
.log-entry:last-child { border-bottom: none; }
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-brand" href="/">
      <span class="navbar-brand-dot"></span>
      Pixiv Viewer
    </a>
    <div class="navbar-links">
      <a class="navbar-link" href="/">搜索</a>
      <a class="navbar-link" href="/gallery">图库</a>
      <a class="navbar-link" href="/bulk">批量</a>
      <a class="navbar-link active" href="/downloads">下载</a>
      <a class="navbar-link" href="/settings">设置</a>
    </div>
  </div>
</nav>

<div class="container mt-3">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">下载管理</h5>
    <button id="refreshBtn" class="btn btn-outline-secondary btn-sm">刷新</button>
  </div>

  <div class="row">
    <!-- Active Downloads -->
    <div class="col-lg-8">
      <div class="status-card card">
        <div class="card-header bg-primary bg-opacity-10 text-primary border-0 d-flex align-items-center gap-2">
          下载中
          <span id="activeCount" class="badge bg-primary ms-auto"></span>
        </div>
        <div class="card-body p-0" id="activeList">
          <div class="empty-state small">暂无活跃下载</div>
        </div>
      </div>

      <div class="status-card card">
        <div class="card-header bg-info bg-opacity-10 text-info border-0 d-flex align-items-center gap-2">
          等待中
          <span id="queuedCount" class="badge bg-info ms-auto"></span>
        </div>
        <div class="card-body p-0" id="queuedList">
          <div class="empty-state small">队列为空</div>
        </div>
      </div>

    </div>

    <!-- Right Column: Completed + Logs -->
    <div class="col-lg-4">
      <div class="status-card card">
        <div class="card-header bg-success bg-opacity-10 text-success border-0 d-flex align-items-center gap-2">
          最近完成
          <span id="completedCount" class="badge bg-success ms-auto"></span>
        </div>
        <div class="card-body p-0" id="completedList" style="max-height:400px;overflow-y:auto;">
          <div class="empty-state small">暂无完成记录</div>
        </div>
      </div>

      <div class="status-card card">
        <div class="card-header bg-secondary bg-opacity-10 text-light border-0">操作日志</div>
        <div class="card-body p-0" id="logList" style="max-height:300px;overflow-y:auto;">
          <div class="empty-state small">暂无日志</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/static/vendor/bootstrap-5.3.3/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
<script>
const actionMap = {
  start: { label: '开始', cls: 'bg-info' },
  done: { label: '完成', cls: 'bg-success' },
  failed: { label: '失败', cls: 'bg-danger' },
  deleted: { label: '删除', cls: 'bg-warning text-dark' },
};

let pollTimer = null;

async function loadData() {
  try {
    const resp = await fetch('/api/downloads');
    const data = await resp.json();
    renderActive(data.active);
    renderQueued(data.queued || []);
    renderCompleted(data.completed);
    renderLogs(data.logs);
  } catch {}
}

function renderActive(items) {
  const container = $('#activeList');
  $('#activeCount').textContent = items.length || '';

  if (!items.length) {
    container.innerHTML = '<div class="empty-state small">暂无活跃下载</div>';
    return;
  }

  container.innerHTML = items.map(i => `
    <div class="dl-item">
      <img class="dl-thumb" src="${proxyThumb(i.thumb_url)}"
           onerror="this.style.display='none'" loading="lazy">
      <div class="dl-info">
        <div class="dl-title" title="${escAttr(i.title)}">${escHtml(i.title || '#' + i.pixiv_id)}</div>
        <div class="dl-meta">#${i.pixiv_id} · ${escHtml(i.user_name)} · ${i.page_count}P${progressText(i)}</div>
        <div class="progress mt-1">
          <div class="progress-bar bg-primary" style="width:${progressPct(i)}%"></div>
        </div>
      </div>
      <div class="dl-status d-flex gap-1">
        <button class="btn btn-outline-danger btn-sm cancel-dl-btn" data-pid="${i.pixiv_id}">取消</button>
        <button class="btn btn-outline-warning btn-sm reset-dl-btn" data-pid="${i.pixiv_id}" title="强制清除卡住的下载">清除</button>
      </div>
    </div>`).join('');

  container.querySelectorAll('.cancel-dl-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (btn.disabled) return;
      btn.disabled = true;
      btn.textContent = '取消中...';
      try {
        const t = await fetch('/csrf-token').then(r => r.json());
        await fetch(`/download/cancel/${btn.dataset.pid}`, {
          method: 'POST',
          headers: { 'X-CSRF-Token': t.token },
        });
        loadData();
      } catch { btn.disabled = false; btn.textContent = '取消'; }
    });
  });

  container.querySelectorAll('.reset-dl-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (btn.disabled) return;
      btn.disabled = true;
      btn.textContent = '清除中...';
      try {
        const t = await fetch('/csrf-token').then(r => r.json());
        await fetch(`/download/reset/${btn.dataset.pid}`, {
          method: 'POST',
          headers: { 'X-CSRF-Token': t.token },
        });
        loadData();
      } catch { btn.disabled = false; btn.textContent = '清除'; }
    });
  });
}

function renderQueued(items) {
  const container = $('#queuedList');
  $('#queuedCount').textContent = items.length || '';

  if (!items.length) {
    container.innerHTML = '<div class="empty-state small">队列为空</div>';
    return;
  }

  container.innerHTML = items.map(i => `
    <div class="dl-item">
      <img class="dl-thumb" src="${proxyThumb(i.thumb_url)}"
           onerror="this.style.display='none'" loading="lazy">
      <div class="dl-info">
        <div class="dl-title" title="${escAttr(i.title)}">${escHtml(i.title || '#' + i.pixiv_id)}</div>
        <div class="dl-meta">#${i.pixiv_id} · ${escHtml(i.user_name)} · ${i.page_count}P · 等待中</div>
        <div class="progress mt-1">
          <div class="progress-bar bg-info" style="width:0%"></div>
        </div>
      </div>
      <div class="dl-status d-flex gap-1">
        <button class="btn btn-outline-danger btn-sm cancel-dl-btn" data-pid="${i.pixiv_id}">取消</button>
      </div>
    </div>`).join('');

  container.querySelectorAll('.cancel-dl-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (btn.disabled) return;
      btn.disabled = true;
      btn.textContent = '取消中...';
      try {
        const t = await fetch('/csrf-token').then(r => r.json());
        await fetch(`/download/cancel/${btn.dataset.pid}`, {
          method: 'POST',
          headers: { 'X-CSRF-Token': t.token },
        });
        loadData();
      } catch { btn.disabled = false; btn.textContent = '取消'; }
    });
  });
}

function renderCompleted(items) {
  const container = $('#completedList');
  $('#completedCount').textContent = items.length || '';

  if (!items.length) {
    container.innerHTML = '<div class="empty-state small">暂无完成记录</div>';
    return;
  }

  container.innerHTML = items.map(i => `
    <div class="dl-item">
      <img class="dl-thumb" src="${proxyThumb(i.thumb_url)}"
           onerror="this.style.display='none'" loading="lazy">
      <div class="dl-info">
        <div class="dl-title" title="${escAttr(i.title)}">${escHtml(i.title || '#' + i.pixiv_id)}</div>
        <div class="dl-meta">#${i.pixiv_id} · ${escHtml(i.user_name)}</div>
      </div>
      <div class="dl-status">
        <a href="/download_file/${i.pixiv_id}" class="btn btn-success btn-sm">下载</a>
      </div>
    </div>`).join('');
}

function renderLogs(logs) {
  const container = $('#logList');
  if (!logs.length) {
    container.innerHTML = '<div class="empty-state small">暂无日志</div>';
    return;
  }

  container.innerHTML = logs.map(l => {
    const a = actionMap[l.action] || { label: l.action, cls: 'bg-secondary' };
    const time = new Date(l.created_at).toLocaleString('zh-CN');
    return `<div class="log-entry">
      <span class="badge ${a.cls} me-1" style="font-size:0.65rem;">${a.label}</span>
      <span class="text-muted me-1">#${l.pixiv_id}</span>
      ${escHtml(l.message)}
      <span class="text-muted float-end" style="font-size:0.7rem;">${time}</span>
    </div>`;
  }).join('');
}

function progressPct(i) {
  if (i.progress && i.progress.total > 0) return Math.round((i.progress.current / i.progress.total) * 100);
  return 0;
}

function progressText(i) {
  if (i.progress && i.progress.total > 0) return ` · ${i.progress.current}/${i.progress.total}`;
  return ' · ?/?';
}

// Poll for active downloads
function startPolling() {
  loadData();
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(loadData, 3000);
}

$('#refreshBtn').addEventListener('click', loadData);
startPolling();

// Stop polling when page hidden, resume when visible
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  } else {
    loadData();
    pollTimer = setInterval(loadData, 3000);
  }
});
</script>
</body>
</html>
