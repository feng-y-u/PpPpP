<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>flowyu.xyz</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #f5f5f0;
  color: #2b2b2b;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans SC", "Segoe UI", system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.8;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.container {
  max-width: 640px;
  width: 100%;
  padding: 80px 32px 48px;
}

.site-label {
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #b0b0a8;
  margin-bottom: 48px;
}

.top-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #d4436b;
  margin-bottom: 24px;
}

.greeting {
  font-size: 2.4rem;
  font-weight: 400;
  letter-spacing: 0.04em;
  color: #1f1f1f;
  margin-bottom: 12px;
}

.sub {
  font-size: 0.95rem;
  color: #8a8a82;
  margin-bottom: 40px;
  line-height: 1.6;
}

hr {
  border: none;
  height: 1px;
  background: #e5e5df;
  margin-bottom: 40px;
}

.info-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 48px;
}

.info-row {
  display: flex;
  align-items: baseline;
  gap: 16px;
  font-size: 0.88rem;
}

.info-label {
  color: #b0b0a8;
  width: 70px;
  flex-shrink: 0;
  font-size: 0.78rem;
  letter-spacing: 0.04em;
}

.info-value {
  color: #4a4a4a;
  font-family: "SF Mono", "Cascadia Code", "JetBrains Mono", monospace;
  font-size: 0.85rem;
}

.status-badge {
  display: inline-block;
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  padding: 4px 14px;
  border-radius: 20px;
  background: #e8f0e8;
  color: #3a7a4a;
  text-transform: uppercase;
  margin-bottom: 32px;
}

.footer {
  margin-top: 40px;
  font-size: 0.7rem;
  color: #c0c0b8;
  letter-spacing: 0.04em;
}

/* ── Responsive ── */
@media (max-width: 500px) {
  .container { padding: 48px 20px 32px; }
  .greeting { font-size: 1.8rem; }
  .info-row { flex-direction: column; gap: 2px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="site-label">flowyu.xyz</div>
  <div class="top-dot"></div>
  <h1 class="greeting">你好，风予</h1>
  <p class="sub">
    这是 flowyu.xyz 的测试页面，标志着域名解析与服务器部署验证通过。
  </p>

  <div class="status-badge">● 服务正常</div>

  <hr>

  <div class="info-grid">
    <div class="info-row">
      <span class="info-label">域名</span>
      <span class="info-value">flowyu.xyz</span>
    </div>
    <div class="info-row">
      <span class="info-label">服务器</span>
      <span class="info-value">193.112.128.158</span>
    </div>
    <div class="info-row">
      <span class="info-label">位置</span>
      <span class="info-value">腾讯云 · 上海</span>
    </div>
    <div class="info-row">
      <span class="info-label">状态</span>
      <span class="info-value">已就绪</span>
    </div>
  </div>

  <div class="footer">
    2026 · flowyu.xyz
  </div>
</div>
</body>
</html>
