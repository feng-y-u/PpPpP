<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图库 - Pixiv Viewer</title>
<link href="/static/vendor/bootstrap-5.3.3/bootstrap.min.css" rel="stylesheet">
<link href="/static/style.css" rel="stylesheet">
<style>
/* ── Gallery Cards ── */
.gallery-card {
  border: none;
  border-radius: var(--radius-card);
  overflow: hidden;
  background: var(--bg-elevated);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  height: 100%;
}
.gallery-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-card-hover);
}

.card-img-wrap {
  position: relative;
  background: var(--bg-thumb);
  aspect-ratio: 250 / 250;
  overflow: hidden;
}
.card-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.size-badge {
  position: absolute;
  bottom: 6px;
  right: 6px;
  background: rgba(255,255,255,.85);
  backdrop-filter: blur(6px);
  color: #2b2b2b;
  font-size: 0.68rem;
  padding: 1px 7px;
  border-radius: 4px;
  font-weight: 500;
}

.card-body { padding: 0.6rem 0.7rem; }
.card-title {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-info { font-size: 0.73rem; color: var(--text-secondary); margin-bottom: 0.2rem; }
.tags-wrap { display: flex; flex-wrap: wrap; gap: 3px; margin: 0.25rem 0; }
.tag-badge {
  font-size: 0.62rem;
  background: var(--accent-subtle) !important;
  color: var(--text-muted) !important;
  border-radius: 3px;
  padding: 1px 6px;
}


/* ── Card Checkbox ── */
.card-checkbox {
  display: none;
  position: absolute;
  top: 8px; left: 8px;
  z-index: 5;
  width: 18px; height: 18px;
  accent-color: var(--accent);
  cursor: pointer;
}
.batch-mode .card-checkbox { display: block; }

/* ── Tag Filter ── */
.tag-filter-wrap {
  position: relative;
  margin-bottom: 12px;
}
.tag-filter-input {
  background: var(--bg-elevated) !important;
  border: 1px solid var(--border-input) !important;
  color: var(--text-primary) !important;
  font-size: 0.82rem;
  border-radius: 8px;
  padding: 6px 12px;
  width: 100%;
  max-width: 320px;
}
.tag-filter-input:focus {
  border-color: var(--accent) !important;
  box-shadow: 0 0 0 3px var(--accent-subtle) !important;
  outline: none;
}
.tag-filter-input::placeholder { color: var(--text-muted); }
.tag-filter-active {
  display: inline-block;
  font-size: 0.73rem;
  background: var(--accent-subtle);
  color: var(--accent);
  border: 1px solid rgba(212,67,107,.2);
  padding: 2px 10px;
  border-radius: 5px;
  margin-left: 8px;
}
.tag-filter-clear {
  font-size: 0.7rem;
  color: var(--text-muted);
  cursor: pointer;
  margin-left: 4px;
}
.tag-filter-clear:hover { color: var(--danger); }

/* ── Stats ── */
#stats { color: var(--text-muted) !important; }

</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-brand" href="/">
      <span class="navbar-brand-dot"></span>
      Pixiv Viewer
    </a>
    <div class="navbar-links">
      <a class="navbar-link" href="/">搜索</a>
      <a class="navbar-link active" href="/gallery">图库</a>
      <a class="navbar-link" href="/bulk">批量</a>
      <a class="navbar-link" href="/downloads">下载</a>
      <a class="navbar-link" href="/settings">设置</a>
    </div>
  </div>
</nav>

<div class="container mt-3">
  <div class="d-flex align-items-center gap-2 mb-2">
    <h5 class="mb-0" id="pageTitle">已下载作品</h5>
    <div class="d-flex gap-1 ms-auto">
      <select id="sortSelect" class="form-select form-select-sm" style="width:auto;">
        <option value="created">按收录时间</option>
        <option value="downloaded">按下载时间</option>
      </select>
      <select id="collectionSelect" class="form-select form-select-sm" style="width:auto;">
        <option value="">全部作品</option>
      </select>
      <a href="/settings" class="btn btn-outline-secondary btn-sm" id="btnManageCollections">管理收藏夹</a>
      <button id="btnBatchMode" class="btn btn-outline-secondary btn-sm">多选</button>
    </div>
    <div id="batchToolbar" class="d-flex align-items-center gap-2" style="display:none;">
      <button id="btnSelectAll" class="btn btn-outline-secondary btn-sm">全选</button>
      <button id="btnBatchDelete" class="btn btn-outline-danger btn-sm" disabled>删除选中</button>
      <span id="batchCount" class="small" style="color:var(--text-muted);"></span>
    </div>
  </div>
  <div class="tag-filter-wrap">
    <input id="tagFilter" class="tag-filter-input" type="text" placeholder="搜索标签..." list="tagList" autocomplete="off">
    <datalist id="tagList"></datalist>
    <span id="tagFilterActive" class="tag-filter-active" style="display:none;"></span>
  </div>
  <div id="cardGrid" class="row"></div>
  <div id="emptyState" class="empty-state" style="display:none;">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    <h6 id="emptyTitle">暂无已下载作品</h6>
    <p class="small" id="emptyDesc">搜索作品并下载后在此查看</p>
  </div>
  <div id="stats" class="small mb-3" style="display:none;"></div>
  <div id="loadMoreWrap" style="text-align:center;padding:1rem 0;display:none;">
    <button id="loadMoreBtn" class="btn btn-outline-primary btn-sm">加载更多</button>
  </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="liveToast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg"></div>
      <button class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header py-2">
        <h6 class="modal-title">确认删除</h6>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body small" id="deleteModalBody"></div>
      <div class="modal-footer py-1">
        <button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-danger btn-sm" id="confirmDeleteBtn">删除</button>
      </div>
    </div>
  </div>
</div>

<script src="/static/vendor/bootstrap-5.3.3/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
<script>
const csrfToken = {{ csrf_token | tojson }};

let deleteTarget = null, deleteMode = 'single', activeTag = '';
let selectedPids = new Set(), batchMode = false;
let galleryOffset = 0, galleryTotal = 0, galleryHasMore = false, galleryFavTotal = 0;
let allTags = [];
let activeCollectionId = '';
let sortOrder = 'created';
const PAGE_SIZE = 50;
const deleteModal = new bootstrap.Modal($('#deleteModal'));

// Read ?tag= and ?collection_id from URL on load
const urlParams = new URLSearchParams(location.search);
if (urlParams.has('tag')) {
  activeTag = urlParams.get('tag');
}
activeCollectionId = urlParams.get('collection_id') || '';

loadGallery(0);
loadTags();
loadCollections();

if (activeTag) {
  const el = $('#tagFilterActive');
  el.style.display = 'inline-block';
  el.innerHTML = `${escHtml(activeTag)} <span class="tag-filter-clear">✕</span>`;
  $('#tagFilter').value = activeTag;
}

function setActiveTag(tag) {
  activeTag = tag;
  const el = $('#tagFilterActive');
  const input = $('#tagFilter');
  if (tag) {
    el.style.display = 'inline-block';
    el.innerHTML = `${escHtml(tag)} <span class="tag-filter-clear">✕</span>`;
    input.value = tag;
  } else {
    el.style.display = 'none';
    input.value = '';
  }
  loadGallery(0);
}

$('#tagFilter').addEventListener('input', function() {
  const val = this.value.trim();
  if (!val) { setActiveTag(''); return; }
  if (allTags.includes(val)) { setActiveTag(val); }
});

$('#tagFilter').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const val = this.value.trim();
    if (val && allTags.includes(val)) setActiveTag(val);
  }
});

$('#tagFilterActive')?.addEventListener('click', function(e) {
  if (e.target.classList.contains('tag-filter-clear')) setActiveTag('');
});


function loadGallery(offset) {
  const params = new URLSearchParams();
  if (activeTag) params.set('tag', activeTag);
  if (activeCollectionId) params.set('collection_id', activeCollectionId);
  params.set('sort', sortOrder);
  params.set('limit', PAGE_SIZE);
  params.set('offset', offset);
  fetch('/api/gallery?' + params.toString())
    .then(r => r.json())
    .then(data => {
      if (offset === 0) {
        $('#cardGrid').innerHTML = '';
        selectedPids.clear();
        updateBatchUI();
      }
      if (data.data.length === 0) {
        if (offset === 0) {
          $('#emptyState').style.display = 'block';
          $('#stats').style.display = 'none';
          if (activeCollectionId) {
            $('#emptyTitle').textContent = '暂无收藏作品';
            $('#emptyDesc').textContent = '在作品详情页点击 ♥ 收藏添加到此处';
          } else {
            $('#emptyTitle').textContent = '暂无已下载作品';
            $('#emptyDesc').textContent = '搜索作品并下载后在此查看';
          }
        }
        $('#loadMoreWrap').style.display = 'none';
        return;
      }
      $('#emptyState').style.display = 'none';
      let totalSize = 0;
      data.data.forEach(item => {
        totalSize += item.file_size || 0;
        renderCard(item);
      });
      updateBatchUI();
      galleryOffset = offset + data.data.length;
      galleryTotal = data.total;
      galleryFavTotal = data.favorite_total || 0;
      galleryHasMore = data.has_more;
      $('#stats').style.display = 'block';
      const shown = Math.min(galleryTotal, galleryOffset);
      let statsText = `${shown} / ${galleryTotal} 个作品，总大小 ${fmtSize(totalSize)}`;
      if (activeTag) statsText += ` · 标签: ${escHtml(activeTag)}`;
      if (!activeCollectionId && galleryFavTotal > 0) statsText += ` · ❤ ${galleryFavTotal}`;
      $('#stats').textContent = statsText;
      $('#loadMoreWrap').style.display = data.has_more ? 'block' : 'none';
    })
    .catch(() => showToast('加载图库失败', true));
}

$('#loadMoreBtn').addEventListener('click', () => loadGallery(galleryOffset));

function loadTags() {
  fetch('/api/gallery/tags')
    .then(r => r.json())
    .then(tags => {
      allTags = tags;
      $('#tagList').innerHTML = tags.map(t => `<option value="${escAttr(t)}">`).join('');
    });
}

function renderCard(r) {
  const tags = (r.tags || []).slice(0, 6).map(t =>
    `<span class="badge tag-badge">${escHtml(t)}</span>`
  ).join('');

  const thumbUrl = proxyThumb(r.thumb_url);

  const col = document.createElement('div');
  col.className = 'col-lg-3 col-md-4 col-sm-6 col-12 mb-3';
  col.innerHTML = `
    <div class="gallery-card" data-pid="${r.pixiv_id}" style="cursor:pointer;">
      <div class="card-img-wrap">
        <input type="checkbox" class="card-checkbox" data-pid="${r.pixiv_id}">
        <img src="${thumbUrl}" loading="lazy" onerror="this.style.display='none'">
        <span class="size-badge">${fmtSize(r.file_size || 0)}</span>
      </div>
      <div class="card-body">
        <div class="card-title" title="${escAttr(r.title)}">${r.is_favorite ? '❤ ' : ''}${escHtml(r.title)}</div>
        <div class="card-info">#${r.pixiv_id} · ${escHtml(r.user_name)} · ${r.file_count || 1} 文件</div>
        <div class="tags-wrap">${tags}</div>
        <div class="d-flex gap-1 mt-1">
          <button class="btn btn-outline-danger btn-sm flex-fill delete-btn" data-pid="${r.pixiv_id}">删除</button>
          ${r.local_dir ? `<button class="btn btn-outline-secondary btn-sm open-dir-btn" data-dir="${escAttr(r.local_dir)}" title="打开文件夹">📂</button>` : ''}
        </div>
      </div>
    </div>`;
  $('#cardGrid').appendChild(col);

  col.querySelector('.gallery-card').addEventListener('click', function(e) {
    if (e.target.closest('.delete-btn') || e.target.closest('.card-checkbox')) return;
    window.location.href = `/detail/${r.pixiv_id}`;
  });

  col.querySelector('.delete-btn').addEventListener('click', function() {
    deleteTarget = r.pixiv_id;
    deleteMode = 'single';
    $('#deleteModalBody').textContent = `确定删除 #${r.pixiv_id} 的所有已下载文件？`;
    deleteModal.show();
  });

  col.querySelector('.open-dir-btn')?.addEventListener('click', function(e) {
    e.stopPropagation();
    fetch('/api/open-dir', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
      body: JSON.stringify({ path: this.dataset.dir }),
    }).catch(() => {});
  });

  col.querySelector('.card-checkbox').addEventListener('change', function() {
    const pid = parseInt(this.dataset.pid);
    if (this.checked) selectedPids.add(pid);
    else selectedPids.delete(pid);
    updateBatchUI();
  });
}

$('#confirmDeleteBtn').addEventListener('click', async () => {
  if (!deleteTarget) return;
  const btn = $('#confirmDeleteBtn');
  btn.disabled = true;
  btn.textContent = '删除中...';
  deleteModal.hide();

  if (deleteMode === 'batch') {
    const ids = deleteTarget;
    try {
      const resp = await fetch('/api/gallery/batch-delete', {
        method: 'POST',
        headers: { 'X-CSRF-Token': csrfToken, 'Content-Type': 'application/json' },
        body: JSON.stringify({ ids }),
      });
      const data = await resp.json();
      if (resp.ok) {
        showToast(data.message);
        setTimeout(() => location.reload(), 800);
      } else {
        showToast(data.error || '批量删除失败', true);
        btn.disabled = false;
        btn.textContent = '删除';
      }
    } catch {
      showToast('网络错误', true);
      btn.disabled = false;
      btn.textContent = '删除';
    }
    deleteTarget = null;
    deleteMode = 'single';
    return;
  }

  try {
    const resp = await fetch(`/api/gallery/${deleteTarget}`, {
      method: 'DELETE',
      headers: { 'X-CSRF-Token': csrfToken },
    });
    const data = await resp.json();
    if (resp.ok) {
      showToast(data.message);
      setTimeout(() => location.reload(), 800);
    } else {
      showToast(data.error || '删除失败', true);
      btn.disabled = false;
      btn.textContent = '删除';
    }
  } catch {
    showToast('网络错误', true);
    btn.disabled = false;
    btn.textContent = '删除';
  }
  deleteTarget = null;
});

// ── Batch Selection ──

function toggleBatchMode() {
  batchMode = !batchMode;
  if (batchMode) {
    $('#cardGrid').classList.add('batch-mode');
    $('#batchToolbar').style.display = 'flex';
    $('#btnBatchMode').textContent = '取消';
  } else {
    $('#cardGrid').classList.remove('batch-mode');
    $('#batchToolbar').style.display = 'none';
    $('#btnBatchMode').textContent = '多选';
    selectedPids.clear();
    document.querySelectorAll('.card-checkbox').forEach(cb => cb.checked = false);
  }
  updateBatchUI();
}

$('#btnBatchMode').addEventListener('click', toggleBatchMode);

// ── Collection Filter ──

function loadCollections() {
  fetch('/api/collections')
    .then(r => r.json())
    .then(collections => {
      const sel = $('#collectionSelect');
      sel.innerHTML = '<option value="">全部作品</option>' +
        collections.map(c => `<option value="${c.id}">${escHtml(c.name)} (${c.item_count})</option>`).join('');
      if (activeCollectionId) sel.value = activeCollectionId;
    })
    .catch(() => showToast('加载收藏夹失败', true));
}

$('#collectionSelect').addEventListener('change', function() {
  activeCollectionId = this.value;
  activeTag = '';
  setActiveTag('');
  const name = this.options[this.selectedIndex]?.text || '';
  $('#pageTitle').textContent = activeCollectionId ? `${name} - 收藏夹` : '已下载作品';
  loadGallery(0);
});

$('#sortSelect').addEventListener('change', function() {
  sortOrder = this.value;
  loadGallery(0);
});

function updateBatchUI() {
  const count = selectedPids.size;
  $('#btnBatchDelete').disabled = count === 0;
  $('#btnBatchDelete').textContent = count ? `删除选中 (${count})` : '删除选中';
  $('#batchCount').textContent = count ? `已选 ${count} 个` : '';
}

$('#btnSelectAll').addEventListener('click', () => {
  if (!batchMode) toggleBatchMode();
  document.querySelectorAll('.card-checkbox').forEach(cb => {
    cb.checked = true;
    selectedPids.add(parseInt(cb.dataset.pid));
  });
  updateBatchUI();
});

$('#btnBatchDelete').addEventListener('click', () => {
  if (selectedPids.size === 0) return;
  deleteTarget = Array.from(selectedPids);
  deleteMode = 'batch';
  $('#deleteModalBody').textContent = `确定删除选中的 ${selectedPids.size} 个作品的所有已下载文件？此操作不可恢复。`;
  deleteModal.show();
});
</script>
</body>
</html>
