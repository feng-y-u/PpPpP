<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设置 - Pixiv Viewer</title>
<link href="/static/vendor/bootstrap-5.3.3/bootstrap.min.css" rel="stylesheet">
<link href="/static/style.css" rel="stylesheet">
<style>
.settings-card {
  border: none;
  border-radius: var(--radius);
  background: var(--bg-elevated);
  border: 1px solid var(--border-card);
  margin-bottom: 1.25rem;
  overflow: hidden;
}
.settings-card .card-header {
  font-weight: 600;
  font-size: 0.82rem;
  border-bottom: 1px solid var(--border-subtle);
  padding: 0.7rem 1.25rem;
}
.settings-card .card-body { padding: 1.25rem; }

.form-group {
  margin-bottom: 1rem;
}
.form-group:last-child { margin-bottom: 0; }
.form-label {
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 0.3rem;
  display: block;
}
.form-description {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 0.2rem;
}
.form-input {
  background: var(--bg-elevated) !important;
  border: 1px solid var(--border-input) !important;
  color: var(--text-primary) !important;
  font-size: 0.85rem;
  border-radius: 8px;
  padding: 8px 12px;
  width: 100%;
  max-width: 400px;
  transition: border-color 0.15s;
}
.form-input:focus {
  border-color: var(--accent) !important;
  box-shadow: 0 0 0 3px var(--accent-subtle) !important;
  outline: none;
}
.form-input::placeholder { color: var(--text-muted); }
.form-input.small { max-width: 140px; }

.form-check-group {
  display: flex;
  align-items: center;
  gap: 10px;
}
.form-check-group input[type="checkbox"] {
  width: 18px; height: 18px;
  accent-color: var(--accent);
  cursor: pointer;
}
.form-check-group label {
  font-size: 0.82rem;
  color: var(--text-primary);
  cursor: pointer;
}

.btn-save {
  background: var(--accent);
  border: none;
  color: #fff;
  font-weight: 600;
  font-size: 0.85rem;
  padding: 0.5rem 2rem;
  border-radius: 8px;
  transition: all 0.15s;
}
.btn-save:hover { background: var(--accent-hover); box-shadow: 0 4px 14px rgba(212,67,107,.25); color: #fff; }
.btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

.collection-mgmt-item {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 0; border-bottom: 1px solid var(--border-subtle);
  font-size: 0.85rem;
}
.collection-mgmt-item:last-child { border-bottom: none; }
.collection-mgmt-name { flex: 1; font-weight: 500; color: var(--text-primary); }
.collection-mgmt-count { color: var(--text-muted); font-size: 0.78rem; min-width: 50px; text-align: right; }
.collection-mgmt-actions { display: flex; gap: 6px; }
.collection-mgmt-rename-input {
  background: var(--bg-elevated); border: 1px solid var(--accent);
  color: var(--text-primary); font-size: 0.82rem; border-radius: 6px;
  padding: 4px 8px; width: 160px; outline: none;
}</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-brand" href="/">
      <span class="navbar-brand-dot"></span>
      Pixiv Viewer
    </a>
    <button class="nav-toggle" aria-label="菜单" onclick="this.nextElementSibling.classList.toggle('open')">☰</button>
    <div class="navbar-links">
      <a class="navbar-link" href="/">搜索</a>
      <a class="navbar-link" href="/gallery">图库</a>
      <a class="navbar-link" href="/bulk">批量</a>
      <a class="navbar-link" href="/downloads">下载</a>
      <a class="navbar-link active" href="/settings">设置</a>
    </div>
  </div>
</nav>

<div class="container mt-3" style="max-width:700px;">
  <h5 class="mb-3">设置</h5>

  <div class="settings-card">
    <div class="card-header">网络</div>
    <div class="card-body">
      <div class="form-group">
        <label class="form-label" for="proxy">代理地址</label>
        <input class="form-input" id="proxy" type="text" placeholder="如 http://127.0.0.1:7890，留空禁用">
        <div class="form-description">HTTP/SOCKS5 代理，修改后需重启生效</div>
      </div>
    </div>
  </div>

  <div class="settings-card">
    <div class="card-header">下载</div>
    <div class="card-body">
      <div class="form-group">
        <label class="form-label" for="download_max_workers">并发下载数</label>
        <input class="form-input small" id="download_max_workers" type="number" min="1" max="8">
        <div class="form-description">同时下载的最大作品数 (1-8)，修改后需重启生效</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="fetch_detail_workers">详情抓取并发</label>
        <input class="form-input small" id="fetch_detail_workers" type="number" min="1" max="10">
        <div class="form-description">搜索后拉取作品详情的并发线程数，892M 小机建议 1-2，修改后需重启生效</div>
      </div>
    </div>
  </div>

  <div class="settings-card">
    <div class="card-header">显示</div>
    <div class="card-body">
      <div class="form-group">
        <label class="form-label" for="medium_image_size">详情页图片尺寸</label>
        <input class="form-input small" id="medium_image_size" type="number" min="250" max="1200" step="50">
        <div class="form-description">中图长边像素 (250-1200)，数值越小加载越快。3Mbps 小站点建议 400-600</div>
      </div>
    </div>
  </div>

  <div class="settings-card">
    <div class="card-header">搜索</div>
    </div>
  </div>

  <div class="settings-card">
    <div class="card-header">搜索</div>
    <div class="card-body">
      <div class="form-group">
        <label class="form-label" for="per_page">每页结果数</label>
        <input class="form-input small" id="per_page" type="number" min="10" max="120">
        <div class="form-description">Pixiv 每页返回的作品数</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="search_pages">搜索最大页数</label>
        <input class="form-input small" id="search_pages" type="number" min="1" max="100">
        <div class="form-description">每次搜索最多抓取的页数</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="max_bookmarks_default">最低收藏数</label>
        <input class="form-input small" id="max_bookmarks_default" type="number" min="0">
        <div class="form-description">搜索时默认的最低收藏数过滤 (0 表示不限制)</div>
      </div>
    </div>
  </div>

  <div class="settings-card">
    <div class="card-header">自动关注</div>
    <div class="card-body">
      <div class="form-group">
        <label class="form-label" for="auto_follow_interval">检查间隔（秒）</label>
        <input class="form-input small" id="auto_follow_interval" type="number" min="0">
        <div class="form-description">关注画师新作品的检查间隔，0 表示禁用</div>
      </div>
      <div class="form-group">
        <div class="form-check-group">
          <input type="checkbox" id="auto_follow_download">
          <label for="auto_follow_download">自动下载新作品</label>
        </div>
        <div class="form-description">启用后自动下载关注画师的新作品</div>
      </div>
    </div>
  </div>

  <div class="settings-card">
    <div class="card-header">收藏夹管理</div>
    <div class="card-body">
      <div class="form-group" style="display:flex;gap:8px;align-items:center;">
        <input class="form-input" id="newCollectionName" placeholder="新建收藏夹名称..." style="max-width:250px;">
        <button class="btn btn-primary-accent btn-sm" id="createCollectionBtn">创建</button>
      </div>
      <div id="collectionList" class="mt-2"></div>
    </div>
  </div>

  <!-- Collection Delete Confirm Modal -->
  <div class="modal fade" id="deleteCollectionModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header py-2">
          <h6 class="modal-title">确认删除</h6>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body small" id="deleteCollectionModalBody"></div>
        <div class="modal-footer py-1">
          <button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">取消</button>
          <button class="btn btn-danger btn-sm" id="confirmDeleteCollectionBtn">删除</button>
        </div>
      </div>
    </div>
  </div>

  <div class="d-flex gap-2 mb-4">
    <button class="btn-save" id="saveBtn">保存设置</button>
    <span id="saveStatus" class="small" style="color:var(--text-muted);align-self:center;display:none;"></span>
  </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="liveToast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg"></div>
      <button class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="/static/vendor/bootstrap-5.3.3/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
<script>
const csrfToken = {{ csrf_token | tojson }};

const FIELD_MAP = [
  'proxy', 'download_max_workers', 'fetch_detail_workers', 'medium_image_size',
  'per_page', 'search_pages',
  'max_bookmarks_default', 'auto_follow_interval', 'auto_follow_download',
];

async function loadSettings() {
  try {
    const r = await fetch('/api/settings');
    const data = await r.json();
    FIELD_MAP.forEach(key => {
      const el = $('#' + key);
      if (!el) return;
      if (el.type === 'checkbox') {
        el.checked = !!data[key];
      } else {
        el.value = data[key] != null ? data[key] : '';
      }
    });
  } catch { showToast('加载设置失败'); }
}

$('#saveBtn').addEventListener('click', async () => {
  const btn = $('#saveBtn');
  btn.disabled = true;
  btn.textContent = '保存中...';

  const body = {};
  FIELD_MAP.forEach(key => {
    const el = $('#' + key);
    if (!el) return;
    if (el.type === 'checkbox') {
      body[key] = el.checked;
    } else if (el.type === 'number') {
      body[key] = parseInt(el.value) || 0;
    } else {
      body[key] = el.value;
    }
  });

  try {
    const r = await fetch('/api/settings', {
      method: 'POST',
      headers: { 'X-CSRF-Token': csrfToken, 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await r.json();
    if (r.ok) {
      showToast('设置已保存（部分设置需重启后生效）');
    } else {
      showToast(data.error || '保存失败');
    }
  } catch { showToast('网络错误'); }
  finally {
    btn.disabled = false;
    btn.textContent = '保存设置';
  }
});

loadSettings();

// ── Collection Management ──
let deleteCollectionId = null;
const deleteCollectionModal = new bootstrap.Modal($('#deleteCollectionModal'));

function loadCollections() {
  fetch('/api/collections')
    .then(r => r.json())
    .then(collections => {
      const list = $('#collectionList');
      if (collections.length === 0) {
        list.innerHTML = '<div style="color:var(--text-muted);padding:0.5rem 0;">暂无收藏夹</div>';
        return;
      }
      list.innerHTML = collections.map(c => `
        <div class="collection-mgmt-item" data-id="${c.id}">
          <span class="collection-mgmt-name">${escHtml(c.name)}</span>
          <span class="collection-mgmt-count">${c.item_count} 件</span>
          <div class="collection-mgmt-actions">
            <button class="btn btn-soft btn-sm rename-btn">重命名</button>
            <button class="btn btn-outline-danger btn-sm delete-btn">删除</button>
          </div>
        </div>
      `).join('');
    })
    .catch(() => showToast('加载收藏夹失败', true));
}

$('#createCollectionBtn').addEventListener('click', async function() {
  const name = $('#newCollectionName').value.trim();
  if (!name) return;
  this.disabled = true;
  try {
    const r = await fetch('/api/collections', {
      method: 'POST',
      headers: { 'X-CSRF-Token': csrfToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
    if (r.ok) {
      $('#newCollectionName').value = '';
      loadCollections();
      showToast('收藏夹已创建');
    } else {
      const data = await r.json();
      showToast(data.error || '创建失败', true);
    }
  } catch { showToast('网络错误', true); }
  finally { this.disabled = false; }
});

// Allow Enter key on new collection input
$('#newCollectionName').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') $('#createCollectionBtn').click();
});

// Delegate events for collection list actions
$('#collectionList').addEventListener('click', function(e) {
  const item = e.target.closest('.collection-mgmt-item');
  if (!item) return;
  const cid = parseInt(item.dataset.id);

  // Delete button
  if (e.target.classList.contains('delete-btn')) {
    const name = item.querySelector('.collection-mgmt-name').textContent;
    deleteCollectionId = cid;
    $('#deleteCollectionModalBody').textContent = `确定删除收藏夹「${name}」？作品本身不会被删除。`;
    deleteCollectionModal.show();
    return;
  }

  // Rename button
  if (e.target.classList.contains('rename-btn')) {
    const nameEl = item.querySelector('.collection-mgmt-name');
    const currentName = nameEl.textContent;
    nameEl.innerHTML = `<input class="collection-mgmt-rename-input" type="text" value="${escAttr(currentName)}">`;
    const input = nameEl.querySelector('input');
    input.focus();
    input.select();

    const done = async () => {
      const newName = input.value.trim();
      if (!newName || newName === currentName) { nameEl.textContent = currentName; return; }
      try {
        const r = await fetch(`/api/collections/${cid}`, {
          method: 'PUT',
          headers: { 'X-CSRF-Token': csrfToken, 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: newName }),
        });
        if (r.ok) { nameEl.textContent = newName; showToast('已重命名'); }
        else { const d = await r.json(); showToast(d.error || '重命名失败', true); nameEl.textContent = currentName; }
      } catch { showToast('网络错误', true); nameEl.textContent = currentName; }
    };
    input.addEventListener('blur', done);
    input.addEventListener('keydown', function(ev) {
      if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
      if (ev.key === 'Escape') { nameEl.textContent = currentName; input.blur(); }
    });
    return;
  }
});

$('#confirmDeleteCollectionBtn').addEventListener('click', async function() {
  if (!deleteCollectionId) return;
  this.disabled = true;
  deleteCollectionModal.hide();
  try {
    const r = await fetch(`/api/collections/${deleteCollectionId}`, {
      method: 'DELETE',
      headers: { 'X-CSRF-Token': csrfToken },
    });
    if (r.ok) {
      loadCollections();
      showToast('收藏夹已删除');
    } else {
      const d = await r.json();
      showToast(d.error || '删除失败', true);
    }
  } catch { showToast('网络错误', true); }
  finally {
    this.disabled = false;
    deleteCollectionId = null;
  }
});

loadCollections();
</script>
</body>
</html>
