<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设置 - Pixiv Viewer</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/static/style.css" rel="stylesheet">
<style>
.settings-card {
  border: none;
  border-radius: var(--radius);
  background: var(--bg-elevated);
  border: 1px solid var(--border-card);
  margin-bottom: 1.25rem;
  overflow: hidden;
}
.settings-card .card-header {
  font-weight: 600;
  font-size: 0.82rem;
  border-bottom: 1px solid var(--border-subtle);
  padding: 0.7rem 1.25rem;
}
.settings-card .card-body { padding: 1.25rem; }

.form-group {
  margin-bottom: 1rem;
}
.form-group:last-child { margin-bottom: 0; }
.form-label {
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 0.3rem;
  display: block;
}
.form-description {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 0.2rem;
}
.form-input {
  background: var(--bg-elevated) !important;
  border: 1px solid var(--border-input) !important;
  color: var(--text-primary) !important;
  font-size: 0.85rem;
  border-radius: 8px;
  padding: 8px 12px;
  width: 100%;
  max-width: 400px;
  transition: border-color 0.15s;
}
.form-input:focus {
  border-color: var(--accent) !important;
  box-shadow: 0 0 0 3px var(--accent-subtle) !important;
  outline: none;
}
.form-input::placeholder { color: var(--text-muted); }
.form-input.small { max-width: 140px; }

.form-check-group {
  display: flex;
  align-items: center;
  gap: 10px;
}
.form-check-group input[type="checkbox"] {
  width: 18px; height: 18px;
  accent-color: var(--accent);
  cursor: pointer;
}
.form-check-group label {
  font-size: 0.82rem;
  color: var(--text-primary);
  cursor: pointer;
}

.btn-save {
  background: var(--accent);
  border: none;
  color: #fff;
  font-weight: 600;
  font-size: 0.85rem;
  padding: 0.5rem 2rem;
  border-radius: 8px;
  transition: all 0.15s;
}
.btn-save:hover { background: var(--accent-hover); box-shadow: 0 4px 14px rgba(212,67,107,.25); color: #fff; }
.btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-brand" href="/">
      <span class="navbar-brand-dot"></span>
      Pixiv Viewer
    </a>
    <div class="navbar-links">
      <a class="navbar-link" href="/">搜索</a>
      <a class="navbar-link" href="/gallery">图库</a>
      <a class="navbar-link" href="/bulk">批量</a>
      <a class="navbar-link" href="/downloads">下载</a>
      <a class="navbar-link active" href="/settings">设置</a>
    </div>
  </div>
</nav>

<div class="container mt-3" style="max-width:700px;">
  <h5 class="mb-3">设置</h5>

  <div class="settings-card">
    <div class="card-header">网络</div>
    <div class="card-body">
      <div class="form-group">
        <label class="form-label" for="proxy">代理地址</label>
        <input class="form-input" id="proxy" type="text" placeholder="如 http://127.0.0.1:7890，留空禁用">
        <div class="form-description">HTTP/SOCKS5 代理，修改后需重启生效</div>
      </div>
    </div>
  </div>

  <div class="settings-card">
    <div class="card-header">下载</div>
    <div class="card-body">
      <div class="form-group">
        <label class="form-label" for="download_max_workers">并发下载数</label>
        <input class="form-input small" id="download_max_workers" type="number" min="1" max="8">
        <div class="form-description">同时下载的最大作品数 (1-8)，修改后需重启生效</div>
      </div>
    </div>
  </div>

  <div class="settings-card">
    <div class="card-header">搜索</div>
    <div class="card-body">
      <div class="form-group">
        <label class="form-label" for="per_page">每页结果数</label>
        <input class="form-input small" id="per_page" type="number" min="10" max="120">
        <div class="form-description">Pixiv 每页返回的作品数</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="search_pages">搜索最大页数</label>
        <input class="form-input small" id="search_pages" type="number" min="1" max="100">
        <div class="form-description">每次搜索最多抓取的页数</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="max_bookmarks_default">最低收藏数</label>
        <input class="form-input small" id="max_bookmarks_default" type="number" min="0">
        <div class="form-description">搜索时默认的最低收藏数过滤 (0 表示不限制)</div>
      </div>
    </div>
  </div>

  <div class="settings-card">
    <div class="card-header">自动关注</div>
    <div class="card-body">
      <div class="form-group">
        <label class="form-label" for="auto_follow_interval">检查间隔（秒）</label>
        <input class="form-input small" id="auto_follow_interval" type="number" min="0">
        <div class="form-description">关注画师新作品的检查间隔，0 表示禁用</div>
      </div>
      <div class="form-group">
        <div class="form-check-group">
          <input type="checkbox" id="auto_follow_download">
          <label for="auto_follow_download">自动下载新作品</label>
        </div>
        <div class="form-description">启用后自动下载关注画师的新作品</div>
      </div>
    </div>
  </div>

  <div class="d-flex gap-2 mb-4">
    <button class="btn-save" id="saveBtn">保存设置</button>
    <span id="saveStatus" class="small" style="color:var(--text-muted);align-self:center;display:none;"></span>
  </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="liveToast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg"></div>
      <button class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
<script>
const csrfToken = '{{ csrf_token | safe }}';

const FIELD_MAP = [
  'proxy', 'download_max_workers', 'per_page', 'search_pages',
  'max_bookmarks_default', 'auto_follow_interval', 'auto_follow_download',
];

async function loadSettings() {
  try {
    const r = await fetch('/api/settings');
    const data = await r.json();
    FIELD_MAP.forEach(key => {
      const el = $('#' + key);
      if (!el) return;
      if (el.type === 'checkbox') {
        el.checked = !!data[key];
      } else {
        el.value = data[key] != null ? data[key] : '';
      }
    });
  } catch { showToast('加载设置失败'); }
}

$('#saveBtn').addEventListener('click', async () => {
  const btn = $('#saveBtn');
  btn.disabled = true;
  btn.textContent = '保存中...';

  const body = {};
  FIELD_MAP.forEach(key => {
    const el = $('#' + key);
    if (!el) return;
    if (el.type === 'checkbox') {
      body[key] = el.checked;
    } else if (el.type === 'number') {
      body[key] = parseInt(el.value) || 0;
    } else {
      body[key] = el.value;
    }
  });

  try {
    const r = await fetch('/api/settings', {
      method: 'POST',
      headers: { 'X-CSRF-Token': csrfToken, 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await r.json();
    if (r.ok) {
      showToast('设置已保存（部分设置需重启后生效）');
    } else {
      showToast(data.error || '保存失败');
    }
  } catch { showToast('网络错误'); }
  finally {
    btn.disabled = false;
    btn.textContent = '保存设置';
  }
});

loadSettings();
</script>
</body>
</html>
