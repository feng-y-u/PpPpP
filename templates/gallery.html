<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图库 - Pixiv Viewer</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/static/style.css" rel="stylesheet">
<style>
/* ── Gallery Cards ── */
.gallery-card {
  border: none;
  border-radius: var(--radius);
  overflow: hidden;
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.05);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  height: 100%;
}
.gallery-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,.3);
}

.card-img-wrap {
  position: relative;
  background: #1e1b2e;
  aspect-ratio: 250 / 250;
  overflow: hidden;
}
.card-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.size-badge {
  position: absolute;
  bottom: 8px;
  right: 8px;
  background: rgba(0,0,0,.65);
  backdrop-filter: blur(6px);
  color: #fff;
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 5px;
}

.card-body { padding: 0.75rem; }
.card-title {
  font-size: 0.85rem;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-info { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.3rem; }
.tags-wrap { display: flex; flex-wrap: wrap; gap: 3px; margin: 0.3rem 0; }
.tag-badge {
  font-size: 0.65rem;
  background: rgba(255,255,255,.05) !important;
  color: var(--text-muted) !important;
  border-radius: 4px;
  padding: 2px 6px;
}

.btn-close-white { filter: invert(1); }

/* ── Batch Toolbar ── */
#batchToolbar .form-check-input {
  width: 18px; height: 18px;
  accent-color: var(--accent);
  cursor: pointer;
  background-color: rgba(255,255,255,.1);
  border-color: rgba(255,255,255,.2);
}

/* ── Card Checkbox ── */
.card-checkbox {
  display: none;
  position: absolute;
  top: 8px; left: 8px;
  z-index: 5;
  width: 18px; height: 18px;
  accent-color: var(--accent);
  cursor: pointer;
}
.batch-mode .card-checkbox { display: block; }

/* ── Tag Filter ── */
.tag-filter-badge {
  font-size: 0.72rem;
  cursor: pointer;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  color: var(--text-secondary);
  padding: 0.25rem 0.6rem;
  border-radius: 6px;
  transition: all 0.15s;
}
.tag-filter-badge:hover { background: rgba(124,58,237,.15); color: #c4b5fd; }
.tag-filter-badge.active { background: rgba(124,58,237,.25); color: #ddd6fe; border-color: rgba(124,58,237,.3); }

/* ── Stats ── */
#stats { color: var(--text-muted) !important; }

/* ── Modals ── */
.modal-content {
  background: #1a1a2e;
  border: 1px solid rgba(255,255,255,.08);
  color: var(--text-primary);
}
.modal-header { border-color: rgba(255,255,255,.06); }
.modal-footer { border-color: rgba(255,255,255,.06); }
.bg-dark { background: #0d0d1a !important; }

</style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a class="navbar-brand" href="/">Pixiv Viewer</a>
    <div class="d-flex gap-1">
      <a class="nav-link" href="/">搜索</a>
      <a class="nav-link active" href="/gallery">图库</a>
      <a class="nav-link" href="/bulk">批量</a>
      <a class="nav-link" href="/downloads">下载</a>
    </div>
  </div>
</nav>

<div class="container mt-3">
  <h5 class="mb-3">已下载作品</h5>
  <div class="d-flex align-items-center gap-2 mb-2">
    <button id="btnBatchMode" class="btn btn-outline-secondary btn-sm">多选</button>
    <div id="batchToolbar" class="d-flex align-items-center gap-2" style="display:none;">
      <button id="btnSelectAll" class="btn btn-outline-secondary btn-sm">全选</button>
      <button id="btnBatchDelete" class="btn btn-outline-danger btn-sm" disabled>删除选中</button>
      <span id="batchCount" class="small" style="color:var(--text-muted);"></span>
    </div>
  </div>
  <div id="tagFilter" class="d-flex flex-wrap gap-1 mb-3"></div>
  <div id="cardGrid" class="row"></div>
  <div id="emptyState" class="empty-state" style="display:none;">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    <h6>暂无已下载作品</h6>
    <p class="small">搜索作品并下载后在此查看</p>
  </div>
  <div id="stats" class="small mb-3" style="display:none;"></div>
  <div id="loadMoreWrap" style="text-align:center;padding:1rem 0;display:none;">
    <button id="loadMoreBtn" class="btn btn-outline-primary btn-sm">加载更多</button>
  </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="liveToast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg"></div>
      <button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header py-2">
        <h6 class="modal-title">确认删除</h6>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body small" id="deleteModalBody"></div>
      <div class="modal-footer py-1">
        <button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-danger btn-sm" id="confirmDeleteBtn">删除</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
<script>
const csrfToken = '{{ csrf_token | safe }}';

let deleteTarget = null, deleteMode = 'single', activeTag = '';
let selectedPids = new Set(), batchMode = false;
let galleryOffset = 0, galleryTotal = 0, galleryHasMore = false;
const PAGE_SIZE = 50;
const deleteModal = new bootstrap.Modal($('#deleteModal'));

loadGallery(0);
loadTags();

function showToast(msg) {
  const toast = $('#liveToast');
  toast.className = 'toast align-items-center border-0';
  toast.style.background = msg.includes('失败') || msg.includes('错误') ? 'rgba(30,27,46,.92)' : 'rgba(5,150,105,.85)';
  $('#toastMsg').textContent = msg;
  bootstrap.Toast.getOrCreateInstance(toast).show();
}

function loadGallery(offset) {
  const params = new URLSearchParams();
  if (activeTag) params.set('tag', activeTag);
  params.set('limit', PAGE_SIZE);
  params.set('offset', offset);
  fetch('/api/gallery?' + params.toString())
    .then(r => r.json())
    .then(data => {
      if (offset === 0) {
        $('#cardGrid').innerHTML = '';
        selectedPids.clear();
        updateBatchUI();
      }
      if (data.data.length === 0) {
        if (offset === 0) {
          $('#emptyState').style.display = 'block';
          $('#stats').style.display = 'none';
        }
        $('#loadMoreWrap').style.display = 'none';
        return;
      }
      $('#emptyState').style.display = 'none';
      let totalSize = 0;
      data.data.forEach(item => {
        totalSize += item.file_size || 0;
        renderCard(item);
      });
      updateBatchUI();
      galleryOffset = offset + data.data.length;
      galleryTotal = data.total;
      galleryHasMore = data.has_more;
      $('#stats').style.display = 'block';
      const shown = Math.min(galleryTotal, galleryOffset);
      $('#stats').textContent = `${shown} / ${galleryTotal} 个作品，总大小 ${fmtSize(totalSize)}` + (activeTag ? ` · 标签: ${escHtml(activeTag)}` : '');
      $('#loadMoreWrap').style.display = data.has_more ? 'block' : 'none';
    })
    .catch(() => showToast('加载图库失败'));
}

$('#loadMoreBtn').addEventListener('click', () => loadGallery(galleryOffset));

function loadTags() {
  fetch('/api/gallery/tags')
    .then(r => r.json())
    .then(tags => {
      const filter = $('#tagFilter');
      filter.innerHTML = tags.map(t => {
        const cls = t === activeTag ? 'tag-filter-badge active' : 'tag-filter-badge';
        return `<span class="${cls}" data-tag="${escAttr(t)}">${escHtml(t)}</span>`;
      }).join('');
      filter.querySelectorAll('.tag-filter-badge').forEach(b => {
        b.addEventListener('click', () => {
          const tag = b.dataset.tag;
          activeTag = activeTag === tag ? '' : tag;
          loadTags();
          loadGallery(0);
        });
      });
    });
}

function renderCard(r) {
  const tags = (r.tags || []).slice(0, 6).map(t =>
    `<span class="badge tag-badge">${escHtml(t)}</span>`
  ).join('');

  const thumbUrl = proxyThumb(r.thumb_url);

  const localUrls = r.local_urls || [];
  const urlsAttr = escAttr(JSON.stringify(localUrls));
  const hasImages = localUrls.length > 0;

  const col = document.createElement('div');
  col.className = 'col-lg-3 col-md-4 col-sm-6 col-12 mb-3';
  col.innerHTML = `
    <div class="gallery-card" data-pid="${r.pixiv_id}" style="cursor:pointer;">
      <div class="card-img-wrap">
        <input type="checkbox" class="card-checkbox" data-pid="${r.pixiv_id}">
        <img src="${thumbUrl}" loading="lazy" onerror="this.style.display='none'">
        <span class="size-badge">${fmtSize(r.file_size || 0)}</span>
      </div>
      <div class="card-body">
        <div class="card-title" title="${escAttr(r.title)}">${escHtml(r.title)}</div>
        <div class="card-info">#${r.pixiv_id} · ${escHtml(r.user_name)} · ${r.file_count || 1} 文件</div>
        <div class="tags-wrap">${tags}</div>
        <button class="btn btn-outline-danger btn-sm w-100 delete-btn" data-pid="${r.pixiv_id}">删除</button>
      </div>
    </div>`;
  $('#cardGrid').appendChild(col);

  col.querySelector('.gallery-card').addEventListener('click', function(e) {
    if (e.target.closest('.delete-btn') || e.target.closest('.card-checkbox')) return;
    window.location.href = `/detail/${r.pixiv_id}`;
  });

  col.querySelector('.delete-btn').addEventListener('click', function() {
    deleteTarget = r.pixiv_id;
    deleteMode = 'single';
    $('#deleteModalBody').textContent = `确定删除 #${r.pixiv_id} 的所有已下载文件？`;
    deleteModal.show();
  });

  col.querySelector('.card-checkbox').addEventListener('change', function() {
    const pid = parseInt(this.dataset.pid);
    if (this.checked) selectedPids.add(pid);
    else selectedPids.delete(pid);
    updateBatchUI();
  });
}

$('#confirmDeleteBtn').addEventListener('click', async () => {
  if (!deleteTarget) return;
  deleteModal.hide();

  if (deleteMode === 'batch') {
    const ids = deleteTarget;
    try {
      const resp = await fetch('/api/gallery/batch-delete', {
        method: 'POST',
        headers: { 'X-CSRF-Token': csrfToken, 'Content-Type': 'application/json' },
        body: JSON.stringify({ ids }),
      });
      const data = await resp.json();
      if (resp.ok) {
        showToast(data.message);
        setTimeout(() => location.reload(), 800);
      } else {
        showToast(data.error || '批量删除失败');
      }
    } catch {
      showToast('网络错误');
    }
    deleteTarget = null;
    deleteMode = 'single';
    return;
  }

  try {
    const resp = await fetch(`/api/gallery/${deleteTarget}`, {
      method: 'DELETE',
      headers: { 'X-CSRF-Token': csrfToken },
    });
    const data = await resp.json();
    if (resp.ok) {
      showToast(data.message);
      setTimeout(() => location.reload(), 800);
    } else {
      showToast(data.error || '删除失败');
    }
  } catch {
    showToast('网络错误');
  }
  deleteTarget = null;
});

// ── Batch Selection ──

function toggleBatchMode() {
  batchMode = !batchMode;
  if (batchMode) {
    $('#cardGrid').classList.add('batch-mode');
    $('#batchToolbar').style.display = 'flex';
    $('#btnBatchMode').textContent = '取消';
  } else {
    $('#cardGrid').classList.remove('batch-mode');
    $('#batchToolbar').style.display = 'none';
    $('#btnBatchMode').textContent = '多选';
    selectedPids.clear();
    document.querySelectorAll('.card-checkbox').forEach(cb => cb.checked = false);
  }
  updateBatchUI();
}

$('#btnBatchMode').addEventListener('click', toggleBatchMode);

function updateBatchUI() {
  const count = selectedPids.size;
  $('#btnBatchDelete').disabled = count === 0;
  $('#btnBatchDelete').textContent = count ? `删除选中 (${count})` : '删除选中';
  $('#batchCount').textContent = count ? `已选 ${count} 个` : '';
}

$('#btnSelectAll').addEventListener('click', () => {
  document.querySelectorAll('.card-checkbox').forEach(cb => {
    cb.checked = true;
    selectedPids.add(parseInt(cb.dataset.pid));
  });
  updateBatchUI();
});

$('#btnBatchDelete').addEventListener('click', () => {
  if (selectedPids.size === 0) return;
  deleteTarget = Array.from(selectedPids);
  deleteMode = 'batch';
  $('#deleteModalBody').textContent = `确定删除选中的 ${selectedPids.size} 个作品的所有已下载文件？此操作不可恢复。`;
  deleteModal.show();
});
</script>
</body>
</html>
