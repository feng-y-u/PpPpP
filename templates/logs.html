<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下载日志 - Pixiv Viewer</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root {
  --accent: #7c3aed;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --radius: 12px;
}

* { box-sizing: border-box; }

body {
  background: #0b0b12;
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Navbar ── */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(11,11,18,.82);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid rgba(255,255,255,.06);
  padding: 0.75rem 0;
}
.navbar-brand {
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: #fff;
  text-decoration: none;
}
.navbar-brand:hover { color: #fff; }
.nav-link {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-secondary) !important;
  padding: 0.4rem 0.9rem !important;
  border-radius: 6px;
  transition: all 0.15s;
  text-decoration: none;
}
.nav-link:hover { color: #fff !important; background: rgba(255,255,255,.06); }
.nav-link.active { color: #fff !important; background: rgba(124,58,237,.2); }

/* ── Log Table ── */
.log-table {
  background: rgba(255,255,255,.02);
  border: 1px solid rgba(255,255,255,.05);
  border-radius: var(--radius);
  overflow: hidden;
}
.log-table .table {
  margin-bottom: 0;
  color: var(--text-secondary);
  border-collapse: collapse;
}
.log-table thead th {
  font-size: 0.78rem;
  text-transform: uppercase;
  color: var(--text-muted);
  border-bottom: 1px solid rgba(255,255,255,.06);
  background: rgba(255,255,255,.02);
}
.log-table tbody td {
  font-size: 0.82rem;
  vertical-align: middle;
  border-bottom: 1px solid rgba(255,255,255,.04);
  background: transparent;
  color: var(--text-primary);
}
.log-table tbody tr:nth-child(even) td {
  background: rgba(255,255,255,.03);
}

.badge-action { font-size: 0.68rem; }

/* ── Pagination ── */
.pagination-wrap { margin-top: 1rem; }
.page-link {
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.06);
  color: var(--text-secondary);
  font-size: 0.82rem;
}
.page-link:hover {
  background: rgba(255,255,255,.06);
  color: #fff;
}
.page-item.active .page-link {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.page-item.disabled .page-link {
  background: transparent;
  border-color: rgba(255,255,255,.04);
  color: var(--text-muted);
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a class="navbar-brand" href="/">Pixiv Viewer</a>
    <div class="d-flex gap-1">
      <a class="nav-link" href="/">搜索</a>
      <a class="nav-link" href="/gallery">图库</a>
      <a class="nav-link" href="/bulk">批量</a>
      <a class="nav-link" href="/downloads">下载</a>
      <a class="nav-link active" href="/logs">日志</a>
    </div>
  </div>
</nav>

<div class="container mt-3">
  <h5 class="mb-3">下载日志</h5>
  <div id="logContent"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const $ = s => document.querySelector(s);
let currentPage = 1;

function loadLogs(page) {
  fetch(`/api/logs?page=${page}`)
    .then(r => r.json())
    .then(data => {
      currentPage = data.page;
      renderTable(data);
    });
}

function renderTable(data) {
  const actionMap = {
    start: { label: '开始下载', cls: 'bg-info' },
    done: { label: '下载完成', cls: 'bg-success' },
    failed: { label: '下载失败', cls: 'bg-danger' },
    deleted: { label: '已删除', cls: 'bg-warning text-dark' },
  };

  const rows = data.entries.map(e => {
    const a = actionMap[e.action] || { label: e.action, cls: 'bg-secondary' };
    const time = new Date(e.created_at).toLocaleString('zh-CN');
    return `<tr>
      <td>${time}</td>
      <td><span class="badge ${a.cls} badge-action">${a.label}</span></td>
      <td>#${e.pixiv_id}</td>
      <td>${escHtml(e.message)}</td>
    </tr>`;
  }).join('');

  const totalPages = Math.ceil(data.total / data.per_page) || 1;
  const pages = [];
  for (let p = 1; p <= totalPages; p++) {
    pages.push(`<li class="page-item ${p === currentPage ? 'active' : ''}">
      <a class="page-link" href="#" data-page="${p}">${p}</a></li>`);
  }

  $('#logContent').innerHTML = `
    <div class="log-table table-responsive">
      <table class="table mb-0">
        <thead><tr><th>时间</th><th>操作</th><th>作品ID</th><th>详情</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="4" class="text-center text-muted py-4">暂无日志</td></tr>'}</tbody>
      </table>
    </div>
    <nav class="pagination-wrap"><ul class="pagination pagination-sm justify-content-center">${pages}</ul></nav>`;

  document.querySelectorAll('.page-link').forEach(link => {
    link.addEventListener('click', e => {
      e.preventDefault();
      loadLogs(parseInt(link.dataset.page));
    });
  });
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

loadLogs(1);
</script>
</body>
</html>
